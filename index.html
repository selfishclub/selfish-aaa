<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 스터디</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --bg4: #22222f;
    --accent: #7c6cfc;
    --accent2: #a78bfa;
    --accent3: #c4b5fd;
    --teal: #2dd4bf;
    --coral: #fb7185;
    --amber: #fbbf24;
    --text: #f0effe;
    --text2: #a89fc8;
    --text3: #5c5480;
    --border: rgba(124,108,252,0.15);
    --border2: rgba(124,108,252,0.3);
    --card-r: 14px;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 배경 장식 ── */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(124,108,252,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -20%;
    right: -10%;
    width: 50%;
    height: 50%;
    background: radial-gradient(ellipse, rgba(45,212,191,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── 레이아웃 ── */
  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; position: relative; z-index: 1; }

  /* ── 헤더 ── */
  header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
  }
  .header-inner { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
  .logo-area {}
  .logo-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .logo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 7vw, 80px);
    letter-spacing: 0.02em;
    line-height: 0.9;
    color: var(--text);
  }
  .logo-title span { color: var(--accent); }
  .logo-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text2);
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .header-stats { display: flex; gap: 32px; align-items: flex-end; }
  .stat-item { text-align: right; }
  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.1em; margin-top: 4px; font-family: var(--mono); }

  /* ── 탭 네비 ── */
  .nav-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 36px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
    width: fit-content;
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* ── 탭 패널 ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ══════════════════════════════
     TAB 1: 타임라인
  ══════════════════════════════ */
  .timeline-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 0.05em;
    color: var(--text);
  }
  .section-title span { color: var(--accent); }

  .week-filter { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-chip {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-chip:hover, .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .timeline-grid { display: flex; flex-direction: column; gap: 0; }

  .timeline-week {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 0 32px;
    position: relative;
  }
  .timeline-week + .timeline-week { margin-top: 40px; }

  .week-label {
    padding-top: 4px;
    text-align: right;
  }
  .week-badge {
    display: inline-block;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    color: var(--accent2);
    line-height: 1;
  }
  .week-date {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    margin-top: 5px;
  }

  .week-content { position: relative; padding-left: 24px; border-left: 1px solid var(--border); }
  .week-dot {
    position: absolute;
    left: -5px;
    top: 6px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(124,108,252,0.6);
  }

  .week-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .submission-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .submission-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--teal));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .submission-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    background: var(--bg3);
  }
  .submission-card:hover::before { opacity: 1; }

  .card-member {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .card-preview {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 10px;
    font-weight: 300;
  }
  .card-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .card-tag {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(124,108,252,0.1);
    color: var(--accent3);
    border: 1px solid rgba(124,108,252,0.2);
  }
  .card-tag.has-img { background: rgba(45,212,191,0.1); color: var(--teal); border-color: rgba(45,212,191,0.2); }
  .card-tag.has-link { background: rgba(251,113,133,0.1); color: var(--coral); border-color: rgba(251,113,133,0.2); }

  /* ══════════════════════════════
     TAB 2: 팀원 현황
  ══════════════════════════════ */
  .members-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
  .member-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 24px;
    transition: all 0.2s;
  }
  .member-card:hover { border-color: var(--border2); }

  .member-top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  .member-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg4);
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .member-name { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .member-role { font-size: 11px; font-family: var(--mono); color: var(--text3); }

  .member-progress { margin-bottom: 14px; }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; font-family: var(--mono);
    color: var(--text3); margin-bottom: 6px;
  }
  .progress-label span { color: var(--accent2); }
  .progress-bar {
    height: 4px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--teal));
    transition: width 0.8s ease;
  }

  .week-dots { display: flex; gap: 6px; flex-wrap: wrap; }
  .week-dot-item {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .week-dot-item.done {
    background: rgba(124,108,252,0.2);
    border: 1px solid var(--accent);
    color: var(--accent2);
  }
  .week-dot-item.done:hover { background: var(--accent); color: #fff; }
  .week-dot-item.miss {
    background: var(--bg4);
    border: 1px solid var(--border);
    color: var(--text3);
  }
  .week-dot-item.future {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text3);
    opacity: 0.4;
  }

  /* 제출률 요약 */
  .summary-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }
  .summary-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 20px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .summary-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .summary-icon.purple { background: rgba(124,108,252,0.15); }
  .summary-icon.teal { background: rgba(45,212,191,0.15); }
  .summary-icon.coral { background: rgba(251,113,133,0.15); }
  .summary-icon.amber { background: rgba(251,191,36,0.15); }
  .summary-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--text); line-height: 1; }
  .summary-desc { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }

  /* ══════════════════════════════
     TAB 3: 회고글
  ══════════════════════════════ */
  .reader-layout { display: grid; grid-template-columns: 260px 1fr; gap: 28px; align-items: start; }
  .reader-sidebar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    overflow: hidden;
    position: sticky;
    top: 20px;
  }
  .sidebar-head {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .sidebar-list { max-height: 70vh; overflow-y: auto; }
  .sidebar-item {
    padding: 12px 18px;
    cursor: pointer;
    border-bottom: 1px solid rgba(124,108,252,0.06);
    transition: background 0.15s;
  }
  .sidebar-item:hover { background: var(--bg3); }
  .sidebar-item.active { background: rgba(124,108,252,0.1); border-left: 2px solid var(--accent); }
  .si-week { font-size: 10px; font-family: var(--mono); color: var(--accent); margin-bottom: 3px; }
  .si-name { font-size: 13px; color: var(--text); font-weight: 500; }
  .si-date { font-size: 10px; color: var(--text3); margin-top: 2px; }

  .reader-main {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 36px 40px;
    min-height: 400px;
  }
  .reader-empty {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 300px;
    color: var(--text3);
    font-size: 14px;
    gap: 12px;
  }
  .reader-empty-icon { font-size: 40px; opacity: 0.3; }

  .reader-meta { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .reader-week { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 6px; }
  .reader-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.03em; color: var(--text); }

  /* marked.js 렌더링 스타일 */
  .md-body { line-height: 1.8; color: var(--text2); font-weight: 300; }
  .md-body h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--text); margin: 28px 0 12px; letter-spacing: 0.03em; }
  .md-body h2 { font-size: 18px; font-weight: 700; color: var(--text); margin: 24px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .md-body h3 { font-size: 15px; font-weight: 500; color: var(--accent3); margin: 18px 0 8px; }
  .md-body p { margin-bottom: 14px; }
  .md-body ul, .md-body ol { padding-left: 20px; margin-bottom: 14px; }
  .md-body li { margin-bottom: 4px; }
  .md-body a { color: var(--accent2); text-decoration: none; border-bottom: 1px solid rgba(167,139,250,0.3); }
  .md-body a:hover { color: var(--accent3); border-color: var(--accent3); }
  .md-body code { font-family: var(--mono); font-size: 12px; background: var(--bg4); padding: 2px 6px; border-radius: 4px; color: var(--teal); }
  .md-body pre { background: var(--bg4); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 16px 0; overflow-x: auto; }
  .md-body pre code { background: none; padding: 0; }
  .md-body img { max-width: 100%; border-radius: 8px; margin: 16px 0; border: 1px solid var(--border); }
  .md-body blockquote { border-left: 3px solid var(--accent); padding-left: 16px; margin: 16px 0; color: var(--text3); font-style: italic; }

  /* ══════════════════════════════
     TAB 4: 갤러리
  ══════════════════════════════ */
  .gallery-filters { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; align-items: center; }
  .gallery-grid { columns: 3; column-gap: 16px; }
  @media (max-width: 900px) { .gallery-grid { columns: 2; } }
  @media (max-width: 560px) { .gallery-grid { columns: 1; } }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    display: block;
  }
  .gallery-item:hover { border-color: var(--border2); transform: scale(1.01); }
  .gallery-img {
    width: 100%;
    display: block;
    background: var(--bg3);
    min-height: 120px;
    object-fit: cover;
  }
  .gallery-img-placeholder {
    width: 100%;
    min-height: 160px;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    opacity: 0.3;
  }
  .gallery-info { padding: 12px 14px; }
  .gi-member { font-size: 10px; font-family: var(--mono); color: var(--accent); margin-bottom: 3px; }
  .gi-week { font-size: 11px; color: var(--text2); }
  .gi-caption { font-size: 12px; color: var(--text3); margin-top: 3px; }

  /* 라이트박스 */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    display: none;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    padding: 40px;
  }
  .lightbox.open { display: flex; }
  .lightbox-inner { max-width: 900px; width: 100%; position: relative; }
  .lightbox img { width: 100%; border-radius: 10px; }
  .lightbox-close {
    position: absolute; top: -16px; right: -16px;
    width: 36px; height: 36px;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 50%;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    z-index: 10;
  }
  .lightbox-close:hover { background: var(--accent); border-color: var(--accent); }
  .lightbox-caption { text-align: center; margin-top: 14px; color: var(--text2); font-size: 13px; }

  /* ── 공통 유틸 ── */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--text3); font-size: 14px; font-weight: 300;
  }
  .empty-state .e-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }

  /* 설정 배너 */
  .config-banner {
    background: rgba(124,108,252,0.08);
    border: 1px dashed rgba(124,108,252,0.3);
    border-radius: var(--card-r);
    padding: 18px 24px;
    margin-bottom: 32px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .config-banner-icon { font-size: 20px; flex-shrink: 0; }
  .config-banner-text { flex: 1; min-width: 200px; }
  .config-banner-text strong { display: block; font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .config-banner-text span { font-size: 12px; color: var(--text3); font-family: var(--mono); }
  .config-banner-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--accent2);
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: var(--mono);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .config-banner-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* 반응형 */
  @media (max-width: 768px) {
    .wrap { padding: 0 16px; }
    .reader-layout { grid-template-columns: 1fr; }
    .reader-sidebar { position: static; }
    .timeline-week { grid-template-columns: 80px 1fr; }
    .header-stats { gap: 16px; }
    .stat-num { font-size: 32px; }
  }

  /* 페이드인 */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease forwards; }
</style>
</head>
<body>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-inner" onclick="event.stopPropagation()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lb-img" src="" alt="">
    <div class="lightbox-caption" id="lb-caption"></div>
  </div>
</div>

<div class="wrap">
  <!-- ── 헤더 ── -->
  <header>
    <div class="header-inner">
      <div class="logo-area">
        <div class="logo-eyebrow">STUDY DASHBOARD</div>
        <div class="logo-title">CLAUDE CODE<br><span>STUDY</span></div>
        <div class="logo-sub">매주 쌓이는 우리 팀의 성장 기록</div>
      </div>
      <div class="header-stats">
        <div class="stat-item">
          <div class="stat-num" id="stat-members">—</div>
          <div class="stat-label">MEMBERS</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-weeks">—</div>
          <div class="stat-label">WEEKS</div>
        </div>
        <div class="stat-item">
          <div class="stat-num" id="stat-submissions">—</div>
          <div class="stat-label">SUBMISSIONS</div>
        </div>
      </div>
    </div>
  </header>

  <!-- ── 설정 배너 ── -->
  <div class="config-banner" id="configBanner">
    <div class="config-banner-icon">⚙️</div>
    <div class="config-banner-text">
      <strong>GitHub 연결 설정이 필요합니다</strong>

/* ═══════════════════════════════════════════════════

const DEMO_DATA = [
  { week: 1, member: "홍길동", date: "2025-01-06", content: `# 1주차 미션 회고\n\n## 이번 주 한 것\nClaude Code를 처음 설치하고 간단한 웹 스크래퍼를 만들어봤습니다. 생각보다 훨씬 빠르게 코드를 작성해줘서 놀랐어요.\n\n## 배운 것\n- Claude Code 기본 명령어 사용법\n- 프롬프트 작성할 때 맥락을 잘 줘야 한다는 것\n- 파일 구조를 먼저 설명하면 훨씬 좋은 결과가 나옴\n\n## 어려웠던 점\n처음에 어떻게 지시를 해야 할지 몰라서 시간이 좀 걸렸습니다.\n\n## 참고 링크\n- [Claude Code 공식 문서](https://docs.anthropic.com)`, hasScreenshot: true, links: ["https://docs.anthropic.com"], screenshot: null },
  { week: 1, member: "김영희", date: "2025-01-07", content: `# 1주차 회고\n\n## 시도한 것\nToday I tried using Claude Code to build a simple React component. It was quite impressive!\n\n## 핵심 인사이트\nPrompt Engineering이 생각보다 중요합니다. 명확하게 원하는 것을 설명할수록 결과가 좋아요.\n\n## 다음 주 목표\n- API 연동 프로젝트 도전\n- 더 복잡한 로직 처리해보기`, hasScreenshot: false, links: [], screenshot: null },
  { week: 1, member: "이민준", date: "2025-01-07", content: `# Week 1 미션 정리\n\n## 진행 내용\nClaude Code로 Python 데이터 분석 스크립트를 작성했습니다.\n\n## 결과\n예상보다 훨씬 빠르게 완성했고, 코드 품질도 좋았습니다.\n\n## 개선점\n다음번엔 테스트 코드도 함께 작성해달라고 요청해봐야겠습니다.`, hasScreenshot: true, links: ["https://github.com"], screenshot: null },
  { week: 2, member: "홍길동", date: "2025-01-13", content: `# 2주차 미션 회고\n\n## 이번 주 프로젝트\nFastAPI 백엔드 API를 Claude Code의 도움으로 만들었습니다. CRUD 기능 전체를 약 2시간 만에 완성!\n\n## 놀라웠던 점\n에러 메시지를 붙여넣으면 바로 원인을 찾아줍니다. 디버깅 시간이 대폭 줄었어요.\n\n## 팁\n> "기존 코드를 읽고 일관된 스타일로 작성해줘" 라고 하면 코드 스타일이 일관됩니다.\n\n## 결과물\n[GitHub 링크](https://github.com)`, hasScreenshot: true, links: ["https://github.com"], screenshot: null },
  { week: 2, member: "박서연", date: "2025-01-14", content: `# 2주차: 첫 풀스택 프로젝트\n\n## 만든 것\n간단한 투두 앱 (React + Node.js)\n\n## Claude Code 활용 포인트\n1. 컴포넌트 분리를 먼저 계획하게 해줬습니다\n2. CSS 스타일링을 빠르게 완성\n3. 배포 스크립트도 자동 생성\n\n## 소감\n비개발자인 제가 풀스택 앱을 만들었다는 게 믿기지 않아요!`, hasScreenshot: true, links: [], screenshot: null },
  { week: 2, member: "이민준", date: "2025-01-14", content: `# 2주차 회고\n\n## 이번 주\n데이터 시각화 대시보드 구현. Chart.js + Python Flask 조합.\n\n## 배운 것\n- 라이브러리 선택도 Claude에게 물어보면 맥락에 맞는 추천을 해줌\n- 코드 설명을 요청하면 학습 효과가 있음\n\n## 다음 목표\n자동화 파이프라인 구축`, hasScreenshot: false, links: ["https://chart.js.org"], screenshot: null },
  { week: 3, member: "홍길동", date: "2025-01-20", content: `# 3주차: 자동화 도전\n\n## 프로젝트\nGitHub Actions + Claude API를 연동한 자동 코드 리뷰 봇\n\n## 과정\n처음엔 복잡해 보였는데, 단계별로 나눠서 요청하니 하나씩 해결되었습니다.\n\n## 인사이트\n**큰 문제를 작게 나눠라.** Claude Code도, 실제 개발도 마찬가지입니다.\n\n## 코드\n\`\`\`python\nimport anthropic\nclient = anthropic.Anthropic()\n\`\`\``, hasScreenshot: true, links: [], screenshot: null },
  { week: 3, member: "김영희", date: "2025-01-21", content: `# 3주차 회고\n\n## 한 것\n자연어로 SQL 쿼리를 생성하는 미니 툴 개발\n\n## 결과\n우리 팀에서 실제로 쓰는 DB 스키마를 Claude에게 설명했더니 정확한 쿼리를 생성해줬어요.\n\n## 팀원들 반응\n팀장님이 "이거 실제로 써도 되겠다"고 하심 🎉`, hasScreenshot: false, links: [], screenshot: null },
];

/* ═══════════════════════════════════════════════════
   데이터 로딩
═══════════════════════════════════════════════════ */
let allData = [];
let currentWeekFilter = "all";
let currentGalleryFilter = "all";

async function loadData() {
  if (USE_DEMO_DATA) {
    allData = DEMO_DATA;
    document.getElementById("configBanner").style.display = "flex";
  } else {
    try {
      allData = await fetchGitHubData();
      document.getElementById("configBanner").style.display = "none";
    } catch(e) {
      console.error("GitHub 로딩 실패:", e);
      allData = DEMO_DATA;
    }
  }
  renderAll();
}

async function fetchGitHubData() {
  const { owner, repo, branch, token } = GITHUB_CONFIG;
  const headers = token ? { Authorization: `token ${token}` } : {};
  const base = `https://api.github.com/repos/${owner}/${repo}`;

  const tree = await fetch(`${base}/git/trees/${branch}?recursive=1`, { headers }).then(r => r.json());
  const mdFiles = tree.tree.filter(f => f.path.match(/^week-\d+\/.+\.md$/i));

  const results = await Promise.all(mdFiles.map(async file => {
    const weekMatch = file.path.match(/week-(\d+)/i);
    const nameMatch = file.path.match(/\/([^/]+)\.md$/i);
    const week = weekMatch ? parseInt(weekMatch[1]) : 0;
    const member = nameMatch ? nameMatch[1] : "unknown";

    const blob = await fetch(`${base}/contents/${file.path}`, { headers }).then(r => r.json());
    const content = atob(blob.content.replace(/\n/g, ""));

    const weekScreenshots = tree.tree.filter(f =>
      f.path.startsWith(`week-${String(week).padStart(2,'0')}/screenshots/${member}`) ||
      f.path.startsWith(`week-${week}/screenshots/${member}`)
    );

    const links = [...content.matchAll(/\[.*?\]\((https?:\/\/[^)]+)\)/g)].map(m => m[1]);
    const screenshot = weekScreenshots[0]
      ? `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${weekScreenshots[0].path}`
      : null;

    return { week, member, date: blob.last_modified || "", content, hasScreenshot: weekScreenshots.length > 0, links, screenshot };
  }));

  return results.sort((a, b) => a.week - b.week || a.member.localeCompare(b.member));
}

/* ═══════════════════════════════════════════════════
   렌더링
═══════════════════════════════════════════════════ */
function renderAll() {
  const weeks = [...new Set(allData.map(d => d.week))].sort((a,b) => a-b);
  const members = [...new Set(allData.map(d => d.member))].sort();

  // 헤더 통계
  document.getElementById("stat-members").textContent = members.length;
  document.getElementById("stat-weeks").textContent = weeks.length;
  document.getElementById("stat-submissions").textContent = allData.length;

  renderTimeline(weeks);
  renderMembers(weeks, members);
  renderSidebar();
  renderGallery();
}

/* ── 타임라인 ── */
function renderTimeline(weeks) {
  const filterEl = document.getElementById("weekFilter");
  filterEl.innerHTML = `<div class="filter-chip active" data-week="all" onclick="filterWeek('all',this)">전체</div>` +
    weeks.map(w => `<div class="filter-chip" data-week="${w}" onclick="filterWeek(${w},this)">${w}주차</div>`).join("");

  buildTimeline(weeks);
}

function buildTimeline(weeks) {
  const grid = document.getElementById("timelineGrid");
  const filtered = currentWeekFilter === "all" ? weeks : [currentWeekFilter];

  grid.innerHTML = filtered.map(w => {
    const entries = allData.filter(d => d.week === w);
    const dateStr = entries[0]?.date ? entries[0].date.slice(0,10) : "";
    const cards = entries.map(d => `
      <div class="submission-card" onclick="openReader('${d.member}',${d.week})">
        <div class="card-member">${d.member}</div>
        <div class="card-preview">${getPreview(d.content)}</div>
        <div class="card-meta">
          ${d.hasScreenshot ? '<span class="card-tag has-img">스크린샷</span>' : ''}
          ${d.links.length ? '<span class="card-tag has-link">링크 '+ d.links.length +'</span>' : ''}
          <span class="card-tag">회고글</span>
        </div>
      </div>`).join("");

    return `
      <div class="timeline-week">
        <div class="week-label">
          <div class="week-badge">${w}주차</div>
          ${dateStr ? `<div class="week-date">${dateStr}</div>` : ''}
        </div>
        <div class="week-content">
          <div class="week-dot"></div>
          <div class="week-cards">${cards || '<div style="color:var(--text3);font-size:13px">제출 없음</div>'}</div>
        </div>
      </div>`;
  }).join("");
}

function filterWeek(week, el) {
  document.querySelectorAll("#weekFilter .filter-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  currentWeekFilter = week;
  const weeks = [...new Set(allData.map(d => d.week))].sort((a,b) => a-b);
  buildTimeline(weeks);
}

/* ── 팀원 현황 ── */
function renderMembers(weeks, members) {
  const totalPossible = weeks.length * members.length;
  const submitRate = totalPossible ? Math.round(allData.length / totalPossible * 100) : 0;
  const withScreenshot = allData.filter(d => d.hasScreenshot).length;

  document.getElementById("summaryRow").innerHTML = `
    <div class="summary-card">
      <div class="summary-icon purple">👥</div>
      <div><div class="summary-num">${members.length}</div><div class="summary-desc">TOTAL MEMBERS</div></div>
    </div>
    <div class="summary-card">
      <div class="summary-icon teal">📝</div>
      <div><div class="summary-num">${allData.length}</div><div class="summary-desc">TOTAL SUBMISSIONS</div></div>
    </div>
    <div class="summary-card">
      <div class="summary-icon amber">📊</div>
      <div><div class="summary-num">${submitRate}%</div><div class="summary-desc">SUBMIT RATE</div></div>
    </div>
    <div class="summary-card">
      <div class="summary-icon coral">🖼️</div>
      <div><div class="summary-num">${withScreenshot}</div><div class="summary-desc">WITH SCREENSHOT</div></div>
    </div>`;

  const maxWeek = Math.max(...weeks);

  document.getElementById("membersGrid").innerHTML = members.map(m => {
    const submitted = allData.filter(d => d.member === m);
    const submittedWeeks = submitted.map(d => d.week);
    const rate = weeks.length ? Math.round(submitted.length / weeks.length * 100) : 0;
    const initials = m.slice(0, 2);

    const dots = Array.from({length: maxWeek}, (_, i) => i + 1).map(w => {
      if (submittedWeeks.includes(w)) return `<div class="week-dot-item done" title="${w}주차 제출완료" onclick="openReader('${m}',${w})">${w}</div>`;
      if (w <= Math.max(...submittedWeeks, 0)) return `<div class="week-dot-item miss" title="${w}주차 미제출">${w}</div>`;
      return `<div class="week-dot-item future">${w}</div>`;
    }).join("");

    return `
      <div class="member-card">
        <div class="member-top">
          <div class="member-avatar">${initials}</div>
          <div>
            <div class="member-name">${m}</div>
            <div class="member-role">스터디 멤버</div>
          </div>
        </div>
        <div class="member-progress">
          <div class="progress-label">
            <span>제출 현황</span>
            <span>${submitted.length} / ${weeks.length}주 (${rate}%)</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${rate}%"></div></div>
        </div>
        <div class="week-dots">${dots}</div>
      </div>`;
  }).join("");
}

/* ── 사이드바 / 리더 ── */
function renderSidebar() {
  document.getElementById("sidebarList").innerHTML = allData.map((d, i) => `
    <div class="sidebar-item" id="si-${i}" onclick="openReaderByIndex(${i})">
      <div class="si-week">${d.week}주차</div>
      <div class="si-name">${d.member}</div>
      <div class="si-date">${d.date ? d.date.slice(0,10) : ''}</div>
    </div>`).join("");
}

function openReaderByIndex(i) {
  const d = allData[i];
  document.querySelectorAll(".sidebar-item").forEach((el, j) => el.classList.toggle("active", i === j));
  document.getElementById("readerMain").innerHTML = `
    <div class="reader-meta">
      <div class="reader-week">${d.week}주차 미션</div>
      <div class="reader-name">${d.member}</div>
    </div>
    <div class="md-body">${marked.parse(d.content)}</div>`;
}

function openReader(member, week) {
  const i = allData.findIndex(d => d.member === member && d.week === week);
  if (i < 0) return;
  switchTab("reader");
  setTimeout(() => openReaderByIndex(i), 50);
}

/* ── 갤러리 ── */
function renderGallery() {
  const withImg = allData.filter(d => d.hasScreenshot);
  const weeks = [...new Set(withImg.map(d => d.week))].sort((a,b) => a-b);

  document.getElementById("galleryFilters").innerHTML =
    `<div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="filter-chip active" onclick="filterGallery('all',this)">전체</div>
      ${weeks.map(w => `<div class="filter-chip" onclick="filterGallery(${w},this)">${w}주차</div>`).join("")}
    </div>`;

  buildGallery(withImg);
}

function buildGallery(items) {
  if (!items.length) {
    document.getElementById("galleryGrid").innerHTML = `<div class="empty-state"><div class="e-icon">🖼️</div>스크린샷이 있는 제출물이 없습니다</div>`;
    return;
  }
  document.getElementById("galleryGrid").innerHTML = items.map(d => {
    if (d.screenshot) {
      return `
        <div class="gallery-item" onclick="openLightbox('${d.screenshot}','${d.member} - ${d.week}주차')">
          <img class="gallery-img" src="${d.screenshot}" alt="${d.member} ${d.week}주차" loading="lazy">
          <div class="gallery-info">
            <div class="gi-member">${d.member}</div>
            <div class="gi-week">${d.week}주차</div>
          </div>
        </div>`;
    }
    return `
      <div class="gallery-item" onclick="openReader('${d.member}',${d.week})">
        <div class="gallery-img-placeholder">📸</div>
        <div class="gallery-info">
          <div class="gi-member">${d.member}</div>
          <div class="gi-week">${d.week}주차</div>
          <div class="gi-caption">회고글에 스크린샷 포함</div>
        </div>
      </div>`;
  }).join("");
}

function filterGallery(week, el) {
  document.querySelectorAll("#galleryFilters .filter-chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  const withImg = allData.filter(d => d.hasScreenshot && (week === "all" || d.week === week));
  buildGallery(withImg);
}

/* ── 라이트박스 ── */
function openLightbox(src, caption) {
  document.getElementById("lb-img").src = src;
  document.getElementById("lb-caption").textContent = caption;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); }
document.addEventListener("keydown", e => { if(e.key === "Escape") closeLightbox(); });

/* ── 탭 전환 ── */
function switchTab(name) {
  document.querySelectorAll(".tab-btn").forEach((btn, i) => {
    const names = ["timeline","members","reader","gallery"];
    btn.classList.toggle("active", names[i] === name);
  });
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(`panel-${name}`).classList.add("active");
}

/* ── 설정 토글 ── */

  const saved = localStorage.getItem("gh_token") || "";
  const token = prompt("GitHub Token을 입력하세요:\\n(private repo 접근용, 브라우저에 저장됩니다)", saved);
  if (token !== null) {
    localStorage.setItem("gh_token", token);
    location.reload();
  }
}

/* ── 유틸 ── */
function getPreview(md) {
  return md.replace(/#{1,6}\s/g, "").replace(/\*\*/g, "").replace(/\[([^\]]+)\]\([^)]+\)/g, "$1").replace(/`[^`]+`/g, "").trim().slice(0, 100) + "...";
}

/* ── 시작 ── */
loadData();
</script>
